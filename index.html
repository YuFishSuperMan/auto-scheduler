<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>19人智能自動排班系統 (矩陣交叉版)</title>
    <!-- 引入美化介面的 Tailwind CSS -->
    <script src="https://tailwindcss.com"></script>
    <!-- 引入匯出 Excel 必備的 SheetJS -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6 font-sans">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <header class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-slate-800">📅 19人團隊自動排班系統 (橫向月曆版)</h1>
            <p class="text-sm text-slate-500 mt-1">X軸：當月日期/星期 ｜ Y軸：員工姓名 ｜ 右側自動加總班別與休假次數</p>
        </header>

        <!-- 設定區域 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-slate-50 p-4 rounded-lg border">
                <label class="block font-semibold text-slate-700 mb-2">👥 19人名單 (逗號隔開)</label>
                <textarea id="employeeInput" class="w-full border rounded p-2 text-sm h-32 focus:ring-2 focus:ring-blue-500 focus:outline-none">員工01, 員工02, 員工03, 員工04, 員工05, 員工06, 員工07, 員工08, 員工09, 員工10, 員工11, 員工12, 員工13, 員工14, 員工15, 員工16, 員工17, 員工18, 員工19</textarea>
            </div>
            
            <div class="bg-slate-50 p-4 rounded-lg border flex flex-col justify-between">
                <div>
                    <label class="block font-semibold text-slate-700 mb-2">📅 選擇排班月份</label>
                    <input id="monthInput" type="month" class="w-full border rounded p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500" value="2026-06">
                </div>
                <div class="mt-4">
                    <label class="block font-semibold text-slate-700 mb-2">⏱️ 每日班別設定 (逗號隔開)</label>
                    <input id="shiftInput" type="text" class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-blue-500" value="早班, 中班, 晚班">
                </div>
            </div>
        </div>

        <!-- 操控按鈕 -->
        <div class="flex gap-4 mb-6">
            <button onclick="generateSchedule()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow shadow-indigo-200">
                ⚡ 開始公平自動排班
            </button>
            <button onclick="downloadExcel()" id="exportBtn" disabled class="bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg transition-colors shadow">
                📥 匯出 交叉統計 Excel 檔 (.xlsx)
            </button>
        </div>

        <!-- 預覽區塊 -->
        <div class="border rounded-lg overflow-hidden bg-slate-50">
            <div class="bg-slate-200 px-4 py-2 font-semibold text-slate-700 text-sm">🖥️ 班表與統計線上預覽</div>
            <div class="overflow-x-auto max-h-[500px]">
                <table class="w-full text-left border-collapse text-xs bg-white">
                    <thead class="bg-slate-100 sticky top-0 z-10 shadow-sm" id="tableHead">
                        <!-- 動態產生兩行表頭：第一行日期、第二行星期 -->
                    </thead>
                    <tbody id="tableBody" class="divide-y">
                        <tr><td class="p-8 text-center text-slate-400" id="emptyState">請點擊上方按鈕生成班表</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let excelRows = []; // 最終準備送給 Excel 的資料結構
        let datesArray = []; // 當月的所有日期標題
        let currentShifts = [];

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function generateSchedule() {
            const emps = document.getElementById('employeeInput').value.split(',').map(s => s.trim()).filter(Boolean);
            currentShifts = document.getElementById('shiftInput').value.split(',').map(s => s.trim()).filter(Boolean);
            const monthVal = document.getElementById('monthInput').value; // 格式: "2026-06"

            if (emps.length === 0 || currentShifts.length === 0 || !monthVal) {
                alert("請檢查輸入的名單、班別與月份！");
                return;
            }

            const [year, month] = monthVal.split('-').map(Number);
            const totalDays = getDaysInMonth(year, month);
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            // 1. 初始化 X 軸日期與星期資訊
            datesArray = [];
            for (let d = 1; d <= totalDays; d++) {
                let dateObj = new Date(year, month - 1, d);
                let dayName = weekDays[dateObj.getDay()];
                datesArray.push({ day: d, label: `${d}日\n(${dayName})`, dayName: dayName });
            }

            // 2. 初始化 Y 軸每位員工的排班紀錄與統計計數器
            let scheduleMatrix = {};
            emps.forEach(emp => {
                scheduleMatrix[emp] = {
                    name: emp,
                    days: {}, // 紀錄每一天的班別
                    stats: {} // 統計：早班、中班、晚班、休假次數
                };
                currentShifts.forEach(s => scheduleMatrix[emp].stats[s] = 0);
                scheduleMatrix[emp].stats['休假'] = 0;
            });

            // 3. 逐日公平分配班別 (貪婪平均分配法)
            for (let d = 1; d <= totalDays; d++) {
                let todayAssigned = new Set();

                currentShifts.forEach(shift => {
                    // 找出今天還沒排班的員工
                    let availablePool = emps.filter(e => !todayAssigned.has(e));

                    if (availablePool.length > 0) {
                        // 依照該班別已排次數由少到多排序，加上隨機微調確保公平
                        availablePool.sort((a, b) => {
                            let countA = scheduleMatrix[a].stats[shift];
                            let countB = scheduleMatrix[b].stats[shift];
                            return (countA - countB) + (Math.random() - 0.5) * 0.1;
                        });

                        let chosen = availablePool[0];
                        scheduleMatrix[chosen].days[d] = shift;
                        scheduleMatrix[chosen].stats[shift]++;
                        todayAssigned.add(chosen);
                    }
                });

                // 今天沒被分配到任何班的人，自動歸類為「休假」
                emps.forEach(emp => {
                    if (!todayAssigned.has(emp)) {
                        scheduleMatrix[emp].days[d] = '休';
                        scheduleMatrix[emp].stats['休假']++;
                    }
                });
            }

            // 4. 轉換為 SheetJS 容易讀取的 Excel 橫向平鋪物件格式
            excelRows = [];
            emps.forEach(emp => {
                let row = { "員工姓名": emp };
                
                // 塞入每天的班別
                datesArray.forEach(dObj => {
                    row[dObj.label] = scheduleMatrix[emp].days[dObj.day];
                });

                // 塞入右側的統計結果
                currentShifts.forEach(s => {
                    row[`統計_${s}`] = scheduleMatrix[emp].stats[s];
                });
                row["統計_休假"] = scheduleMatrix[emp].stats['休假'];

                excelRows.push(row);
            });

            // 5. 渲染網頁畫面
            renderMatrixTable();
            document.getElementById('exportBtn').disabled = false;
        }

        function renderMatrixTable() {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');

            // 畫雙行表頭
            let tr1 = `<tr class="bg-slate-200 text-slate-700 font-bold border-b">
                <th class="p-2 border sticky left-0 bg-slate-200 z-20 min-w-[80px]">員工 \ 日期</th>`;
            datesArray.forEach(d => {
                let bgText = (d.dayName === '六' || d.dayName === '日') ? 'text-red-500' : 'text-slate-700';
                tr1 += `<th class="p-2 border text-center ${bgText} min-w-[55px]">${d.day}</th>`;
            });
            currentShifts.forEach(s => tr1 += `<th class="p-2 border text-center bg-indigo-50 text-indigo-800 min-w-[50px]" rowspan="2">${s}</th>`);
            tr1 += `<th class="p-2 border text-center bg-emerald-50 text-emerald-800 min-w-[50px]" rowspan="2">休假</th></tr>`;

            let tr2 = `<tr class="bg-slate-100 text-slate-500 border-b">`;
            datesArray.forEach(d => {
                let bgText = (d.dayName === '六' || d.dayName === '日') ? 'text-red-400' : 'text-slate-500';
                tr2 += `<th class="p-1 border text-center ${bgText}">${d.dayName}</th>`;
            });
            tr2 += `</tr>`;

            head.innerHTML = tr1 + tr2;

            // 畫 Y 軸員工資料與對應儲存格
            let bodyHtml = "";
            excelRows.forEach(row => {
                bodyHtml += `<tr class="hover:bg-slate-50 border-b">`;
                bodyHtml += `<td class="p-2 font-bold text-slate-800 border sticky left-0 bg-white shadow-[2px_0_5px_rgba(0,0,0,0.05)]">${row["員工姓名"]}</td>`;
                
                datesArray.forEach(dObj => {
                    let val = row[dObj.label];
                    let textClass = val === '休' ? 'text-gray-400 bg-gray-50' : 'text-slate-800 font-medium';
                    bodyHtml += `<td class="p-2 border text-center ${textClass}">${val}</td>`;
                });

                currentShifts.forEach(s => {
                    bodyHtml += `<td class="p-2 border text-center font-bold text-indigo-600 bg-indigo-50/30">${row[`統計_${s}`]}</td>`;
                });
                bodyHtml += `<td class="p-2 border text-center font-bold text-emerald-600 bg-emerald-50/30">${row["統計_休假"]}</td>`;
                bodyHtml += `</tr>`;
            });
            body.innerHTML = bodyHtml;
        }

        function downloadExcel() {
            if (excelRows.length === 0) return;

            const wb = XLSX.utils.book_new();
            
            // 將我們排好的漂亮交叉格式陣列轉為 Excel Sheet
            const ws = XLSX.utils.json_to_sheet(excelRows);

            // 自動設定欄寬：讓 A 欄員工名、日期欄、統計欄都能完美對齊不被遮字
