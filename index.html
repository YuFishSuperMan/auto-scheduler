<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能自動排班系統 (月份優先版)</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://sheetjs.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6 font-sans">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <header class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-slate-800">📅 智能自動排班系統</h1>
            <p class="text-sm text-slate-500 mt-1">先選月份 ➔ 設定人員特殊條件 ➔ 加入當月名單 ➔ 觸發法規自動排班</p>
        </header>

        <!-- 設定與控制區 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            
            <!-- 1. 人員設定表單 (拉長至左側兩欄) -->
            <div class="bg-slate-50 p-4 rounded-lg border lg:col-span-2">
                <h3 class="font-bold text-slate-700 mb-3 flex items-center">➕ 步驟一：選擇月份並設定人員特殊條件</h3>
                
                <!-- 核心修正：將月份選擇移到最前面，並與姓名、職級並列 -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-semibold text-indigo-700 mb-1">📅 1. 先選擇排班月份</label>
                        <input id="monthInput" type="month" class="w-full border-2 border-indigo-200 rounded p-2 text-sm bg-white font-bold focus:ring-2 focus:ring-indigo-500 focus:outline-none" value="2026-06" onchange="updateDateCheckboxes()">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">2. 選擇員工名稱</label>
                        <select id="selectName" class="w-full border rounded p-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="馬家恩">馬家恩</option>
                            <option value="徐琬玲">徐琬玲</option>
                            <option value="蔡毓暄">蔡毓暄</option>
                            <option value="高崇恩">高崇恩</option>
                            <option value="洪瑞國">洪瑞國</option>
                            <option value="李幸容">李幸容</option>
                            <option value="陳純瑜">陳純瑜</option>
                            <option value="蕭雅文">蕭雅文</option>
                            <option value="鄭力誠">鄭力誠</option>
                            <option value="陳品蓁">陳品蓁</option>
                            <option value="謝采蓉">謝采蓉</option>
                            <option value="陳昱臻">陳昱臻</option>
                            <option value="游惟婷">游惟婷</option>
                            <option value="曾浩恩">曾浩恩</option>
                            <option value="洪宜婷">洪宜婷</option>
                            <option value="林雨臻">林雨臻</option>
                            <option value="張毓芳">張毓芳</option>
                            <option value="丁柔安">丁柔安</option>
                            <option value="吳柏萱">吳柏萱</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">3. 職級分類</label>
                        <select id="selectType" class="w-full border rounded p-2 text-sm bg-white">
                            <option value="正職">正職</option>
                            <option value="兼職">兼職</option>
                        </select>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-xs font-semibold text-slate-600 mb-1">4. 可值班底資格 (可多選，不勾代表全選)</label>
                    <div class="flex flex-wrap gap-4 bg-white p-2 border rounded text-sm">
                        <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" class="shift-check font-bold" value="白班D"> ☀️ 白班D</label>
                        <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" class="shift-check font-bold" value="支援班"> 🤝 支援班</label>
                        <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" class="shift-check font-bold" value="晚班E"> 🌙 晚班E</label>
                        <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" class="shift-check font-bold" value="大夜班"> 🦇 大夜班</label>
                    </div>
                </div>

                <div class="mt-4">
                    <label class="block text-xs font-semibold text-slate-600 mb-1">5. 必定休假日期 (根據上方所選月份動態生成)</label>
                    <div id="dateCheckboxContainer" class="grid grid-cols-7 gap-1 bg-white p-2 border rounded text-xs max-h-36 overflow-y-auto">
                        <!-- 由 JavaScript 根據月份動態生成日期勾選鈕 -->
                    </div>
                </div>

                <button onclick="addEmployeeToList()" class="mt-4 w-full bg-slate-700 hover:bg-slate-800 text-white font-bold py-2 px-4 rounded text-sm transition-colors shadow">
                    📥 將此條件員工加入當月排班名單
                </button>
            </div>
            
            <!-- 2. 右側：各班每日人數設定與參考 -->
            <div class="bg-slate-50 p-4 rounded-lg border flex flex-col justify-between">
                <div>
                    <h3 class="font-bold text-slate-700 mb-3">🎯 每日各班別需滿足人數</h3>
                    <div class="space-y-2 bg-white p-3 border rounded">
                        <div class="flex justify-between items-center text-xs"><span>☀️ 白班 D：</span><input id="numD" type="number" class="w-16 border rounded p-1 text-center" value="2"></div>
                        <div class="flex justify-between items-center text-xs"><span>🤝 支援班：</span><input id="numSup" type="number" class="w-16 border rounded p-1 text-center" value="1"></div>
                        <div class="flex justify-between items-center text-xs"><span>🌙 晚班 E：</span><input id="numE" type="number" class="w-16 border rounded p-1 text-center" value="1"></div>
                        <div class="flex justify-between items-center text-xs"><span>🦇 大夜班：</span><input id="numN" type="number" class="w-16 border rounded p-1 text-center" value="1"></div>
                    </div>
                </div>
                
                <div class="mt-4 bg-white p-2 border rounded text-[11px] text-slate-400 space-y-1">
                    <span class="font-bold text-slate-600">💡 班別時間參考：</span>
                    <div>白班D (8-16) ｜ 支援班 (13-21)</div>
                    <div>晚班E (16-24) ｜ 大夜班 (0-8)</div>
                </div>
            </div>
        </div>

        <!-- 當月已加入名單看板 -->
        <div class="bg-indigo-50/50 p-4 rounded-lg border mb-6">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-indigo-900 text-sm">📋 步驟二：確認當月人員名單 (目前已加入: <span id="listCount" class="text-indigo-600">0</span> 人)</h3>
                <button onclick="addAllDefaultEmployees()" class="text-xs bg-indigo-600 text-white px-2 py-1 rounded hover:bg-indigo-700">⚡ 一鍵加入全體19人(預設正職/全資格)</button>
            </div>
            <div id="addedEmployeesContainer" class="flex flex-wrap gap-2 text-xs">
                <span class="text-slate-400">目前暫無人員，請在上表選取加入，或點擊一鍵加入全體。</span>
            </div>
        </div>

        <!-- 操控動作按鈕 -->
        <div class="flex gap-4 mb-6">
            <button onclick="generateSchedule()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow">
                ⚡ 步驟三：開始自動排班
            </button>
            <button onclick="downloadExcel()" id="exportBtn" disabled class="bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg transition-colors shadow">
                📥 匯出 交叉統計 Excel 檔 (.xlsx)
            </button>
        </div>

        <!-- 預覽區塊 -->
        <div class="border rounded-lg overflow-hidden bg-slate-50">
            <div class="bg-slate-200 px-4 py-2 font-semibold text-slate-700 text-sm">🖥️ 班表與統計線上預覽</div>
            <div class="overflow-x-auto max-h-[500px]">
                <table class="w-full text-left border-collapse text-xs bg-white">
                    <thead class="bg-slate-100 sticky top-0 z-10 shadow-sm" id="tableHead"></thead>
                    <tbody id="tableBody" class="divide-y">
                        <tr><td class="p-8 text-center text-slate-400" id="emptyState">請點擊上方按鈕生成班表</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const defaultNames = ["馬家恩", "徐琬玲", "蔡毓暄", "高崇恩", "洪瑞國", "李幸容", "陳純瑜", "蕭雅文", "鄭力誠", "陳品蓁", "謝采蓉", "陳昱臻", "游惟婷", "曾浩恩", "洪宜婷", "林雨臻", "張毓芳", "丁柔安", "吳柏萱"];
        let currentMonthEmployees = []; 
        let excelRows = [];
        let datesArray = [];
        const shiftKeys = ['白班D', '支援班', '晚班E', '大夜班'];

        document.addEventListener("DOMContentLoaded", function() {
            updateDateCheckboxes();
        });

        function updateDateCheckboxes() {
            const container = document.getElementById('dateCheckboxContainer');
            if (!container) return;
            container.innerHTML = '';
            const monthVal = document.getElementById('monthInput').value;
            if (!monthVal) return;
            
            const [year, month] = monthVal.split('-').map(Number);
            const totalDays = new Date(year, month, 0).getDate();
            
            for(let d = 1; d <= totalDays; d++) {
                let div = document.createElement('div');
                div.className = "flex items-center gap-1 border p-1 bg-white rounded shadow-sm hover:bg-slate-100";
                div.innerHTML = `
                    <input type="checkbox" id="off_day_${d}" class="day-off-check w-4 h-4 text-blue-600 border-gray-300 rounded cursor-pointer" value="${d}">
