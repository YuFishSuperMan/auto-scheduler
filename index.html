<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能自動排班系統 (指定班底資格版)</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-100 min-h-screen p-6 font-sans">

    <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <header class="border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-slate-800">📅 智能自動排班系統 (專屬班底資格版)</h1>
            <p class="text-sm text-slate-500 mt-1">先指定員工的可值班別名單，系統會嚴格由該班別限定的人員中抽選排班，並符合勞基法規範。</p>
        </header>

        <!-- 設定區域 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <!-- 1. 人員與班底設定 -->
            <div class="bg-slate-50 p-4 rounded-lg border lg:col-span-2">
                <label class="block font-semibold text-slate-700 mb-1">👥 員工名單與班別專屬資格設定</label>
                <p class="text-xs text-slate-400 mb-2">
                    格式：姓名,正職/兼職,可值班別(用+號隔開),必定休假日期(用/隔開)<br>
                    <span class="text-indigo-600 font-medium">※ 班別代碼必須為：白班D、支援班、晚班E、大夜班（不寫代表全班別都可以上）</span>
                </p>
                <textarea id="employeeInput" class="w-full border rounded p-2 text-sm h-52 font-mono focus:ring-2 focus:ring-blue-500 focus:outline-none">員工A,正職,白班D+支援班,5/12
員工B,正職,白班D+晚班E,3/15
員工C,兼職,大夜班,7/8/20
員工D,正職,白班D+支援班+晚班E+大夜班,
員工E,兼職,支援班+晚班E,1/2
員工F,正職,大夜班,
員工G,正職,白班D+晚班E,22
員工H,兼職,支援班+晚班E,
員工I,正職,白班D+支援班,</textarea>
            </div>
            
            <!-- 2. 各班每日人數與月份設定 -->
            <div class="bg-slate-50 p-4 rounded-lg border flex flex-col justify-between">
                <div>
                    <label class="block font-semibold text-slate-700 mb-2">📅 選擇排班月份</label>
                    <input id="monthInput" type="month" class="w-full border rounded p-2 text-sm bg-white focus:ring-2 focus:ring-blue-500" value="2026-06">
                </div>
                
                <div class="mt-4">
                    <label class="block font-semibold text-slate-700 mb-1">🎯 每日各班別需滿足人數</label>
                    <div class="space-y-2 bg-white p-3 border rounded">
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium text-slate-600">☀️ 白班 D：</span>
                            <input id="numD" type="number" class="w-16 border rounded p-1 text-center" value="2">
                        </div>
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium text-slate-600">🤝 支援班：</span>
                            <input id="numSup" type="number" class="w-16 border rounded p-1 text-center" value="1">
                        </div>
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium text-slate-600">🌙 晚班 E：</span>
                            <input id="numE" type="number" class="w-16 border rounded p-1 text-center" value="1">
                        </div>
                        <div class="flex justify-between items-center text-xs">
                            <span class="font-medium text-slate-600">🦇 大夜班：</span>
                            <input id="numN" type="number" class="w-16 border rounded p-1 text-center" value="1">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操控按鈕 -->
        <div class="flex gap-4 mb-6">
            <button onclick="generateSchedule()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow">
                ⚡ 開始符合限定班底自動排班
            </button>
            <button onclick="downloadExcel()" id="exportBtn" disabled class="bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg transition-colors shadow">
                📥 匯出 Excel 檔 (.xlsx)
            </button>
        </div>

        <!-- 預覽區塊 -->
        <div class="border rounded-lg overflow-hidden bg-slate-50">
            <div class="bg-slate-200 px-4 py-2 font-semibold text-slate-700 text-sm">🖥️ 班表與統計線上預覽</div>
            <div class="overflow-x-auto max-h-[500px]">
                <table class="w-full text-left border-collapse text-xs bg-white">
                    <thead class="bg-slate-100 sticky top-0 z-10 shadow-sm" id="tableHead"></thead>
                    <tbody id="tableBody" class="divide-y">
                        <tr><td class="p-8 text-center text-slate-400" id="emptyState">請點擊上方按鈕生成班表</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let excelRows = [];
        let datesArray = [];
        const shiftKeys = ['白班D', '支援班', '晚班E', '大夜班'];

        function parseEmployees() {
            const lines = document.getElementById('employeeInput').value.split('\n').filter(Boolean);
            return lines.map(line => {
                const parts = line.split(',');
                const name = parts[0] ? parts[0].trim() : '未命名';
                const type = parts[1] ? parts[1].trim() : '正職';
                
                // 解析允許值班的班底資格（如果沒寫代表四個班都可以上）
                let allowedShifts = shiftKeys;
                if (parts[2] && parts[2].trim() !== "") {
                    allowedShifts = parts[2].split('+').map(s => s.trim()).filter(Boolean);
                }
                
                const offDays = parts[3] ? parts[3].split('/').map(n => parseInt(n.trim())).filter(n => !isNaN(n)) : [];
                return { name, type, allowedShifts, offDays };
            });
        }

        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        function generateSchedule() {
            const emps = parseEmployees();
            const monthVal = document.getElementById('monthInput').value;
            
            const reqD = parseInt(document.getElementById('numD').value) || 0;
            const reqSup = parseInt(document.getElementById('numSup').value) || 0;
            const reqE = parseInt(document.getElementById('numE').value) || 0;
            const reqN = parseInt(document.getElementById('numN').value) || 0;
            
            const requiredShifts = [
                { key: '白班D', count: reqD },
                { key: '支援班', count: reqSup },
                { key: '晚班E', count: reqE },
                { key: '大夜班', count: reqN }
            ];

            if (emps.length === 0 || !monthVal) {
                alert("請填寫員工名單並選擇月份！");
                return;
            }

            const [year, month] = monthVal.split('-').map(Number);
            const totalDays = getDaysInMonth(year, month);
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            datesArray = [];
            for (let d = 1; d <= totalDays; d++) {
                let dateObj = new Date(year, month - 1, d);
                datesArray.push({ day: d, dayName: weekDays[dateObj.getDay()] });
            }

            // 初始化每個人每月的排班歷史
            let scheduleMatrix = {};
            emps.forEach(e => {
                scheduleMatrix[e.name] = {
                    name: e.name,
                    type: e.type,
                    days: {}, 
                    consecutiveWork: 0, 
                    stats: { '白班D': 0, '支援班': 0, '晚班E': 0, '大夜班': 0, '休假': 0 }
                };
            });

            // 演算法核心：每日逐班過濾法
            for (let d = 1; d <= totalDays; d++) {
                let todayAssigned = new Set();

                requiredShifts.forEach(shiftObj => {
                    for (let c = 0; c < shiftObj.count; c++) {
                        
                        // 篩選出今天「符合該班別班底資格」且「合法」可以上的人
                        let availablePool = emps.filter(e => {
                            let m = scheduleMatrix[e.name];
                            
                            // 關鍵新增條件：必須屬於該班別的名單班底成員
                            if (!e.allowedShifts.includes(shiftObj.key)) return false;
                            
                            // 原有法規與設定限制：
                            if (todayAssigned.has(e.name)) return false; // 今天已排過班
                            if (e.offDays.includes(d)) return false;     // 必定休假日排除
                            if (m.consecutiveWork >= 5) return false;    // 不能連續上班超過5天
                            
                            // 勞基法輪班間隔11小時限制
                            if (d > 1) {
                                let lastDayShift = m.days[d - 1];
                                if (lastDayShift === '晚班E' && (shiftObj.key === '白班D' || shiftObj.key === '大夜班' || shiftObj.key === '支援班')) return false;
                                if (lastDayShift === '支援班' && (shiftObj.key === '大夜班' || shiftObj.key === '白班D')) return false;
                                if (lastDayShift === '大夜班' && shiftObj.key === '大夜班') return false; 
                            }

                            return true;
                        });

                        if (availablePool.length > 0) {
                            // 依照該班別已排次數由少到多排序，確保班底內公平分攤
                            availablePool.sort((a, b) => {
                                let countA = scheduleMatrix[a.name].stats[shiftObj.key];
                                let countB = scheduleMatrix[b.name].stats[shiftObj.key];
                                return (countA - countB) + (Math.random() - 0.5) * 0.1;
                            });

                            let chosen = availablePool[0].name;
                            scheduleMatrix[chosen].days[d] = shiftObj.key;
                            scheduleMatrix[chosen].stats[shiftObj.key]++;
